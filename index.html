<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>smoke log</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: #1a1a1a;
  display: flex; justify-content:center; align-items:center;
}

/* ===== PHONE SHELL ===== */
.app {
  width: 100vw; max-width: 430px;
  height: 100dvh; max-height: 932px;
  position: relative; overflow: hidden;
  background: #f7f4ef;
}

/* ===== SWIPE ===== */
.screens {
  display: flex; width: 200%; height: 100%;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
}
.screen { width: 50%; height: 100%; flex-shrink: 0; position: relative; overflow: hidden; }

/* ==================== HOME ==================== */
.sky {
  position: absolute; inset: 0;
  transition: background 1.2s ease;
}
.sky.sunny    { background: linear-gradient(180deg,#5bb8f5 0%,#c2e8ff 100%); }
.sky.cloudy   { background: linear-gradient(180deg,#8eafc2 0%,#c8d8e0 100%); }
.sky.overcast { background: linear-gradient(180deg,#6b7d8a 0%,#aab8bf 100%); }
.sky.rainy    { background: linear-gradient(180deg,#4a5568 0%,#718096 100%); }

.sun {
  position:absolute; top:60px; right:60px;
  width:60px; height:60px; background:#ffe066; border-radius:50%;
  box-shadow:0 0 0 12px rgba(255,224,102,0.25),0 0 0 26px rgba(255,224,102,0.12);
  animation:sunPulse 4s ease-in-out infinite;
  transition:opacity 1s,transform 1s;
}
@keyframes sunPulse {
  0%,100%{box-shadow:0 0 0 12px rgba(255,224,102,0.25),0 0 0 26px rgba(255,224,102,0.12);}
  50%    {box-shadow:0 0 0 20px rgba(255,224,102,0.28),0 0 0 38px rgba(255,224,102,0.14);}
}
.sky.overcast .sun,.sky.rainy .sun{opacity:0;transform:translateY(-16px);}
.sky.cloudy .sun{opacity:0.5;}

.cloud{position:absolute;background:white;border-radius:50px;opacity:0;transition:opacity 1.2s;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
.c1{width:90px;height:28px;top:76px;left:28px;}
.c1::before{width:44px;height:44px;top:-22px;left:12px;}
.c1::after{width:32px;height:32px;top:-14px;left:44px;}
.c2{width:70px;height:22px;top:130px;left:200px;}
.c2::before{width:34px;height:34px;top:-17px;left:8px;}
.c2::after{width:26px;height:26px;top:-12px;left:34px;}
.c3{width:110px;height:32px;top:52px;left:100px;}
.c3::before{width:52px;height:52px;top:-26px;left:14px;}
.c3::after{width:38px;height:38px;top:-18px;left:56px;}
.sky.cloudy .c1,.sky.cloudy .c3{opacity:0.7;}
.sky.overcast .c1,.sky.overcast .c2,.sky.overcast .c3{opacity:0.9;}
.sky.rainy .c1,.sky.rainy .c2,.sky.rainy .c3{opacity:1;background:#b0bec5;}
.sky.rainy .c1::before,.sky.rainy .c1::after,
.sky.rainy .c2::before,.sky.rainy .c2::after,
.sky.rainy .c3::before,.sky.rainy .c3::after{background:#b0bec5;}

.rain-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0;transition:opacity 1s;}
.rain-wrap.active{opacity:1;}
.drop{position:absolute;width:2px;height:12px;background:rgba(150,190,220,0.55);border-radius:2px;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-20px);opacity:0;}10%{opacity:1;}90%{opacity:0.7;}100%{transform:translateY(110vh);opacity:0;}}

.ground{
  position:absolute;bottom:0;left:0;right:0;height:220px;
  background:linear-gradient(180deg,#8fbc6e 0%,#6a9e4a 100%);
  border-radius:60% 60% 0 0/28px 28px 0 0;
}

/* Plant */
.plant-wrap{position:absolute;bottom:198px;left:50%;transform:translateX(-50%);width:120px;height:160px;}
.stem{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);width:5px;background:#4a7c40;border-radius:3px;transform-origin:bottom center;transition:height 0.8s ease;}
.leaf{position:absolute;border-radius:50% 0 50% 0;opacity:0;transition:opacity 0.7s;}
.ll{background:#5a9e48;transform:scaleX(-1) rotate(-25deg);}
.lr{background:#5a9e48;transform:rotate(-25deg);}
.flower-wrap{position:absolute;opacity:0;transition:opacity 0.8s;}
.petal{position:absolute;width:13px;height:20px;background:#ff9eb5;border-radius:50%;transform-origin:center bottom;}
.fcenter{position:absolute;width:15px;height:15px;background:#ffe066;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.pot{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:46px;height:34px;background:#b5651d;border-radius:4px 4px 8px 8px;}
.pot::before{content:'';position:absolute;top:-8px;left:-6px;width:58px;height:12px;background:#cd853f;border-radius:4px;}

.s0 .stem{height:10px;}
.s1 .stem{height:30px;}
.s1 .ll1,.s1 .lr1{opacity:1;width:18px;height:14px;bottom:52px;}
.s1 .ll1{left:18px;} .s1 .lr1{right:18px;}
.s2 .stem{height:60px;}
.s2 .ll1,.s2 .lr1{opacity:1;width:24px;height:18px;bottom:72px;}
.s2 .ll1{left:14px;} .s2 .lr1{right:14px;}
.s2 .ll2,.s2 .lr2{opacity:0.9;width:20px;height:15px;bottom:90px;}
.s2 .ll2{left:18px;} .s2 .lr2{right:18px;}
.s3 .stem{height:90px;}
.s3 .ll1,.s3 .lr1{opacity:1;width:28px;height:20px;bottom:80px;}
.s3 .ll1{left:10px;} .s3 .lr1{right:10px;}
.s3 .ll2,.s3 .lr2{opacity:1;width:22px;height:16px;bottom:106px;}
.s3 .ll2{left:14px;} .s3 .lr2{right:14px;}
.s4 .stem{height:100px;}
.s4 .ll1,.s4 .lr1{opacity:1;width:28px;height:20px;bottom:80px;}
.s4 .ll1{left:10px;} .s4 .lr1{right:10px;}
.s4 .ll2,.s4 .lr2{opacity:1;width:22px;height:16px;bottom:106px;}
.s4 .ll2{left:14px;} .s4 .lr2{right:14px;}
.s4 .flower-wrap{opacity:1;bottom:136px;left:50%;transform:translateX(-50%);width:40px;height:40px;}

/* Home UI overlay */
.home-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.home-header{width:100%;padding:env(safe-area-inset-top, 50px) 24px 0;padding-top:max(env(safe-area-inset-top,0px) + 16px, 50px);display:flex;justify-content:space-between;align-items:flex-start;}
.app-name{font-family:'DM Serif Display',serif;font-size:20px;color:white;text-shadow:0 1px 4px rgba(0,0,0,0.2);letter-spacing:1px;}
.today-date{font-size:11px;color:rgba(255,255,255,0.85);margin-top:2px;}

.count-area{margin-top:24px;display:flex;align-items:baseline;gap:4px;}
.count-big{font-family:'DM Serif Display',serif;font-size:88px;color:white;line-height:1;text-shadow:0 4px 20px rgba(0,0,0,0.18);}
.count-target{font-size:22px;color:rgba(255,255,255,0.75);margin-bottom:8px;}

.interval-block{
  margin-top:18px;
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-radius:20px;
  padding:12px 32px 14px;
  border:1px solid rgba(255,255,255,0.3);
}
.interval-label{font-size:11px;color:rgba(255,255,255,0.8);letter-spacing:2px;margin-bottom:4px;}
.interval-time{font-family:'DM Serif Display',serif;font-size:52px;color:white;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,0.2);letter-spacing:2px;}
.interval-unit{font-size:12px;color:rgba(255,255,255,0.7);margin-top:3px;}

.plant-badge{position:absolute;bottom:228px;left:20px;background:rgba(255,255,255,0.22);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:14px;padding:8px 12px;font-size:11px;color:white;line-height:1.6;pointer-events:none;}
.plant-badge .pname{font-weight:700;font-size:12px;}

.rec-btn{
  position:absolute;bottom:max(env(safe-area-inset-bottom,0px) + 70px, 90px);left:50%;transform:translateX(-50%);
  width:80px;height:80px;background:rgba(255,255,255,0.93);
  border:none;border-radius:50%;cursor:pointer;
  box-shadow:0 8px 28px rgba(0,0,0,0.22);
  font-size:28px;display:flex;align-items:center;justify-content:center;
  transition:transform 0.12s,box-shadow 0.12s;
  pointer-events:all;
  user-select:none;
}
.rec-btn:active{transform:translateX(-50%) scale(0.9);box-shadow:0 4px 14px rgba(0,0,0,0.18);}

/* 記録アニメーション */
@keyframes recPop {
  0%  {transform:translateX(-50%) scale(1);}
  30% {transform:translateX(-50%) scale(0.88);}
  60% {transform:translateX(-50%) scale(1.08);}
  100%{transform:translateX(-50%) scale(1);}
}
.rec-btn.pop { animation: recPop 0.35s ease; }

.dots{position:absolute;bottom:max(env(safe-area-inset-bottom,0px) + 20px, 28px);left:50%;transform:translateX(-50%);display:flex;gap:7px;pointer-events:none;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.45);transition:background 0.3s,transform 0.3s;}
.dot.active{background:white;transform:scale(1.25);}

/* ==================== CALENDAR ==================== */
.cal-screen{background:#f7f4ef;display:flex;flex-direction:column;overflow:hidden;}

.cal-header{
  padding-top:max(env(safe-area-inset-top,0px) + 12px, 48px);
  padding-left:18px;padding-right:18px;padding-bottom:8px;
  background:#f7f4ef;flex-shrink:0;
}
.cal-header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cal-title{font-family:'DM Serif Display',serif;font-size:22px;color:#2d3a2d;}
.cal-nav{display:flex;gap:8px;}
.cal-nav button{background:none;border:1px solid #ccc;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;color:#555;display:flex;align-items:center;justify-content:center;}
.cal-nav button:active{background:#e8e8e8;}
.cal-month-stats{display:flex;gap:20px;}
.cal-stat .sv{font-size:18px;font-weight:700;color:#3a5240;}
.cal-stat .sl{font-size:10px;color:#aaa;margin-top:1px;}

.cal-grid-wrap{padding:0 10px;flex-shrink:0;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px;}
.dow-cell{text-align:center;font-size:11px;color:#bbb;padding:3px 0;}
.dow-cell:first-child{color:#e05555;}
.dow-cell:last-child{color:#4a7fd4;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  aspect-ratio:1;border-radius:9px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.12s;
}
.cal-cell:active{background:rgba(0,0,0,0.07);}
.cal-cell .cd{font-size:12px;color:#333;line-height:1;font-weight:500;}
.cal-cell .cc{font-size:10px;font-weight:700;color:#3a5240;margin-top:1px;}
.cal-cell.empty{pointer-events:none;}
.cal-cell.empty .cd,.cal-cell.empty .cc{color:#ddd;}
.cal-cell.sunday .cd{color:#e05555;}
.cal-cell.saturday .cd{color:#4a7fd4;}
.cal-cell.today{background:#3a5240!important;}
.cal-cell.today .cd,.cal-cell.today .cc{color:white!important;}
.cal-cell.good{background:rgba(90,158,72,0.13);}
.cal-cell.over{background:rgba(220,80,80,0.1);}
.cal-cell.selected:not(.today){outline:2px solid #3a5240;outline-offset:-2px;}

/* ドット（カレンダー） */
.cal-dots{display:flex;gap:7px;justify-content:center;padding:5px 0;flex-shrink:0;}
.cal-dots .dot{background:rgba(58,82,64,0.2);}
.cal-dots .dot.active{background:#3a5240;}

/* 日別パネル */
.day-panel{flex:1;overflow-y:auto;background:white;border-radius:18px 18px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,0.07);}
.day-panel-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px 12px;border-bottom:1px solid #f0f0f0;
  position:sticky;top:0;background:white;z-index:10;border-radius:18px 18px 0 0;
}
.day-panel-date{font-size:15px;font-weight:700;color:#2d3a2d;}
.add-btn{background:#3a5240;color:white;border:none;border-radius:10px;padding:7px 16px;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;}
.add-btn:active{background:#2d4030;}

/* 時刻ヘッダー行 */
.time-list-header{
  display:flex;padding:8px 18px 6px;
  font-size:11px;color:#bbb;letter-spacing:1px;
  border-bottom:1px solid #f5f5f5;
}
.tlh-num{width:28px;}
.tlh-time{flex:1;text-align:center;}
.tlh-iv{flex:1;text-align:center;}

/* 時刻リスト */
.time-list{padding-bottom:24px;}
.time-row-wrap{position:relative;overflow:hidden;}
.time-row{
  display:flex;align-items:center;padding:14px 18px;
  border-bottom:1px solid #f5f5f5;background:white;
  transition:transform 0.25s ease;position:relative;z-index:1;
  user-select:none;
}
.time-num{width:28px;font-size:13px;color:#ccc;flex-shrink:0;}
.time-val{flex:1;font-size:22px;font-weight:700;color:#2d3a2d;text-align:center;}
.time-interval{flex:1;font-size:16px;color:#999;text-align:center;}

.swipe-actions{position:absolute;right:0;top:0;bottom:0;display:flex;z-index:0;}
.sw-edit,.sw-del{display:flex;flex-direction:column;align-items:center;justify-content:center;width:70px;font-size:11px;color:white;cursor:pointer;border:none;font-family:'Zen Kaku Gothic New',sans-serif;}
.sw-edit{background:#4a7c40;}
.sw-del{background:#c0392b;}
.sw-icon{font-size:16px;margin-bottom:3px;}
.sw-edit:active{background:#3d6835;}
.sw-del:active{background:#a93226;}

.empty-day{padding:32px;text-align:center;color:#ccc;font-size:13px;}

/* ==================== MODAL ==================== */
.modal-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.4);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.25s;z-index:200;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{
  background:white;border-radius:22px 22px 0 0;width:100%;
  padding:20px 22px max(env(safe-area-inset-bottom,0px) + 20px, 32px);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:15px;font-weight:700;color:#2d3a2d;margin-bottom:16px;}
.modal-label{font-size:12px;color:#999;margin-bottom:6px;}
.time-input-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.time-input-wrap input[type=time]{
  border:2px solid #e8e8e8;border-radius:14px;
  padding:12px 20px;font-size:26px;font-weight:700;
  font-family:'Zen Kaku Gothic New',sans-serif;color:#2d3a2d;
  outline:none;text-align:center;width:100%;
}
.time-input-wrap input[type=time]:focus{border-color:#3a5240;}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;background:#f2f2f2;color:#666;border:none;border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;}
.btn-save{flex:2;background:#3a5240;color:white;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;}
.btn-cancel:active{background:#e8e8e8;}
.btn-save:active{background:#2d4030;}

/* ==================== SETTINGS ==================== */
.settings-modal{
  position:absolute;inset:0;background:rgba(0,0,0,0.4);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.25s;z-index:300;
}
.settings-modal.open{opacity:1;pointer-events:all;}
.settings-sheet{
  background:white;border-radius:22px 22px 0 0;width:100%;
  padding:20px 22px max(env(safe-area-inset-bottom,0px) + 20px, 32px);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.settings-modal.open .settings-sheet{transform:translateY(0);}
.settings-title{font-size:16px;font-weight:700;color:#2d3a2d;margin-bottom:20px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.settings-row label{font-size:14px;color:#444;}
.settings-row input[type=number]{
  border:1px solid #ddd;border-radius:10px;padding:8px 14px;
  font-size:16px;font-family:'Zen Kaku Gothic New',sans-serif;
  width:90px;text-align:center;outline:none;color:#2d3a2d;
}
.settings-row input[type=number]:focus{border-color:#3a5240;}
.settings-save{width:100%;background:#3a5240;color:white;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;margin-top:4px;}
.settings-save:active{background:#2d4030;}
.settings-gear{
  position:absolute;top:max(env(safe-area-inset-top,0px) + 12px, 52px);right:20px;
  background:rgba(255,255,255,0.22);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:none;border-radius:50%;width:36px;height:36px;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:white;pointer-events:all;
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="screens" id="screens">

    <!-- ===== HOME ===== -->
    <div class="screen">
      <div class="sky sunny" id="sky">
        <div class="sun"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
      </div>
      <div class="rain-wrap" id="rainWrap"></div>
      <div class="ground"></div>

      <div class="plant-wrap s0" id="plant">
        <div class="stem"></div>
        <div class="leaf ll ll1"></div><div class="leaf lr lr1"></div>
        <div class="leaf ll ll2"></div><div class="leaf lr lr2"></div>
        <div class="flower-wrap">
          <div class="petal" style="transform:rotate(0deg) translateY(-10px)"></div>
          <div class="petal" style="transform:rotate(72deg) translateY(-10px)"></div>
          <div class="petal" style="transform:rotate(144deg) translateY(-10px)"></div>
          <div class="petal" style="transform:rotate(216deg) translateY(-10px)"></div>
          <div class="petal" style="transform:rotate(288deg) translateY(-10px)"></div>
          <div class="fcenter"></div>
        </div>
        <div class="pot"></div>
      </div>

      <div class="home-ui">
        <div class="home-header">
          <div>
            <div class="app-name">smoke log</div>
            <div class="today-date" id="todayDate"></div>
          </div>
        </div>
        <div class="count-area">
          <div class="count-big" id="countBig">0</div>
          <div class="count-target">/<span id="targetDisp">3</span>本</div>
        </div>
        <div class="interval-block">
          <div class="interval-label">前回から</div>
          <div class="interval-time" id="intervalTime">−−:−−</div>
          <div class="interval-unit">時間：分</div>
        </div>
      </div>

      <div class="plant-badge">
        <div class="pname" id="pname">🌱 芽吹いたよ</div>
        <div id="pdesc">目標内 0日</div>
      </div>

      <button class="settings-gear" id="settingsBtn">⚙️</button>
      <button class="rec-btn" id="recBtn">🚬</button>

      <div class="dots">
        <div class="dot active" id="hd0"></div>
        <div class="dot" id="hd1"></div>
      </div>
    </div>

    <!-- ===== CALENDAR ===== -->
    <div class="screen cal-screen">
      <div class="cal-header">
        <div class="cal-header-top">
          <div class="cal-title" id="calTitle">2026年3月</div>
          <div class="cal-nav">
            <button id="prevBtn">‹</button>
            <button id="nextBtn">›</button>
          </div>
        </div>
        <div class="cal-month-stats">
          <div class="cal-stat"><div class="sv" id="mTotal">0本</div><div class="sl">今月合計</div></div>
          <div class="cal-stat"><div class="sv" id="mCost">0円</div><div class="sl">今月コスト</div></div>
        </div>
      </div>

      <div class="cal-grid-wrap">
        <div class="dow-row">
          <div class="dow-cell">日</div><div class="dow-cell">月</div>
          <div class="dow-cell">火</div><div class="dow-cell">水</div>
          <div class="dow-cell">木</div><div class="dow-cell">金</div>
          <div class="dow-cell">土</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="cal-dots">
        <div class="dot" id="cd0"></div>
        <div class="dot active" id="cd1"></div>
      </div>

      <div class="day-panel">
        <div class="day-panel-header">
          <div class="day-panel-date" id="dayPanelDate"></div>
          <button class="add-btn" id="addBtn">＋ 追加</button>
        </div>
        <div class="time-list-header">
          <div class="tlh-num"></div>
          <div class="tlh-time">喫煙時刻</div>
          <div class="tlh-iv">インターバル</div>
        </div>
        <div class="time-list" id="timeList"></div>
      </div>

      <!-- 時刻モーダル -->
      <div class="modal-overlay" id="modal">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title" id="modalTitle">喫煙時刻を追加</div>
          <div class="time-input-wrap">
            <input type="time" id="timeInput" value="12:00">
          </div>
          <div class="modal-btns">
            <button class="btn-cancel" id="modalCancel">キャンセル</button>
            <button class="btn-save" id="modalSave">保存</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /screens -->

  <!-- 設定モーダル -->
  <div class="settings-modal" id="settingsModal">
    <div class="settings-sheet">
      <div class="modal-handle"></div>
      <div class="settings-title">⚙️ 設定</div>
      <div class="settings-row">
        <label>1日の目標本数</label>
        <input type="number" id="targetInput" min="1" max="20" value="3">
      </div>
      <div class="settings-row">
        <label>1本あたりの金額（円）</label>
        <input type="number" id="priceInput" min="1" max="200" value="27">
      </div>
      <button class="settings-save" id="settingsSave">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== STORAGE ====================
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ==================== STATE ====================
let settings = LS.get('sl_settings') || { target: 3, price: 27 };
// smokeData: { "YYYY-M-D": ["HH:MM", ...] }
let smokeData = LS.get('sl_data') || {};

let calYear, calMonth, selectedDay;
const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth() + 1;
selectedDay = today.getDate();

const DW = ['日','月','火','水','木','金','土'];

function save() { LS.set('sl_data', smokeData); }
function saveSettings() { LS.set('sl_settings', settings); }

// ==================== SWIPE NAVIGATION ====================
let currentPage = 0;
const screensEl = document.getElementById('screens');
const app = document.getElementById('app');
let tsX=0, tsY=0, dragging=false;

app.addEventListener('touchstart', e => {
  tsX = e.touches[0].clientX;
  tsY = e.touches[0].clientY;
  dragging = false;
}, { passive: true });
app.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tsX;
  const dy = e.touches[0].clientY - tsY;
  if (!dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) dragging = true;
}, { passive: true });
app.addEventListener('touchend', e => {
  if (!dragging) return;
  const dx = e.changedTouches[0].clientX - tsX;
  if (dx < -50 && currentPage === 0) setPage(1);
  if (dx > 50 && currentPage === 1) setPage(0);
});

function setPage(p) {
  currentPage = p;
  screensEl.style.transform = p === 0 ? 'translateX(0)' : 'translateX(-50%)';
  document.getElementById('hd0').classList.toggle('active', p === 0);
  document.getElementById('hd1').classList.toggle('active', p === 1);
  document.getElementById('cd0').classList.toggle('active', p === 0);
  document.getElementById('cd1').classList.toggle('active', p === 1);
}

// ==================== RAIN ====================
const rainWrap = document.getElementById('rainWrap');
for (let i = 0; i < 30; i++) {
  const d = document.createElement('div');
  d.className = 'drop';
  d.style.cssText = `left:${Math.random()*100}%;animation-duration:${0.5+Math.random()*0.9}s;animation-delay:${Math.random()*2}s`;
  rainWrap.appendChild(d);
}

// ==================== WEATHER ====================
const skyEl = document.getElementById('sky');
function updateWeather(n) {
  skyEl.className = 'sky';
  rainWrap.classList.remove('active');
  const t = settings.target;
  if (n === 0 || n <= t - 2)      skyEl.classList.add('sunny');
  else if (n <= t - 1)             skyEl.classList.add('cloudy');
  else if (n <= t)                 skyEl.classList.add('overcast');
  else { skyEl.classList.add('rainy'); rainWrap.classList.add('active'); }
}

// ==================== PLANT ====================
const plantEl = document.getElementById('plant');
function goodDaysCount() {
  let count = 0;
  Object.keys(smokeData).forEach(k => {
    if ((smokeData[k] || []).length <= settings.target) count++;
  });
  return count;
}
function updatePlant() {
  const g = goodDaysCount();
  plantEl.className = 'plant-wrap';
  let s, nm, ds;
  if (g <= 2)       { s=0; nm='🌱 芽吹いたよ';     ds=`目標内 ${g}日`; }
  else if (g <= 7)  { s=1; nm='🌿 育ってきた！';   ds=`目標内 ${g}日`; }
  else if (g <= 14) { s=2; nm='🌿 すくすく育ち中'; ds=`目標内 ${g}日`; }
  else if (g <= 24) { s=3; nm='🌳 大きくなったね'; ds=`目標内 ${g}日！`; }
  else              { s=4; nm='🌸 花が咲いた！';   ds=`目標内 ${g}日 すごい！`; }
  plantEl.classList.add('s'+s);
  document.getElementById('pname').textContent = nm;
  document.getElementById('pdesc').textContent = ds;
}

// ==================== HOME DISPLAY ====================
function todayKey() {
  return `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
}
function calcInterval(times) {
  if (!times || times.length < 2) return '−−:−−';
  const a = times[times.length-2], b = times[times.length-1];
  const [ah,am] = a.split(':').map(Number);
  const [bh,bm] = b.split(':').map(Number);
  const diff = (bh*60+bm) - (ah*60+am);
  if (diff <= 0) return '−−:−−';
  return `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
}

function refreshHome() {
  const t = new Date();
  document.getElementById('todayDate').textContent =
    `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日（${DW[t.getDay()]}）`;
  document.getElementById('targetDisp').textContent = settings.target;

  const key = todayKey();
  const recs = smokeData[key] || [];
  const n = recs.length;
  document.getElementById('countBig').textContent = n;
  document.getElementById('intervalTime').textContent = calcInterval(recs);
  updateWeather(n);
  updatePlant();
}

// ==================== RECORD BUTTON ====================
document.getElementById('recBtn').addEventListener('click', () => {
  const key = todayKey();
  if (!smokeData[key]) smokeData[key] = [];
  const now = new Date();
  const hh = now.getHours().toString().padStart(2,'0');
  const mm = now.getMinutes().toString().padStart(2,'0');
  smokeData[key].push(`${hh}:${mm}`);
  smokeData[key].sort();
  save();
  refreshHome();

  // pop animation
  const btn = document.getElementById('recBtn');
  btn.classList.remove('pop');
  void btn.offsetWidth;
  btn.classList.add('pop');
  setTimeout(() => btn.classList.remove('pop'), 400);

  // カレンダーも今日を表示中なら更新
  if (calYear === today.getFullYear() && calMonth === today.getMonth()+1 && selectedDay === today.getDate()) {
    buildCalendar(); renderTimeList();
  }
});

// ==================== CALENDAR ====================
function buildCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(calYear, calMonth-1, 1).getDay();
  const lastDate = new Date(calYear, calMonth, 0).getDate();
  const isCur = today.getFullYear() === calYear && today.getMonth()+1 === calMonth;

  document.getElementById('calTitle').textContent = `${calYear}年${calMonth}月`;

  let total = 0;
  for (let d = 1; d <= lastDate; d++) {
    total += (smokeData[`${calYear}-${calMonth}-${d}`] || []).length;
  }
  document.getElementById('mTotal').textContent = total + '本';
  document.getElementById('mCost').textContent = (total * settings.price).toLocaleString() + '円';

  for (let i = 0; i < firstDay; i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell empty';
    c.innerHTML = '<div class="cd"></div><div class="cc"></div>';
    grid.appendChild(c);
  }
  for (let d = 1; d <= lastDate; d++) {
    const c = document.createElement('div');
    const dow = (firstDay + d - 1) % 7;
    const cnt = (smokeData[`${calYear}-${calMonth}-${d}`] || []).length;
    let cls = 'cal-cell';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    if (isCur && d === today.getDate()) cls += ' today';
    else if (cnt > 0) cls += cnt <= settings.target ? ' good' : ' over';
    if (d === selectedDay) cls += ' selected';
    c.className = cls;
    c.innerHTML = `<div class="cd">${d}</div><div class="cc">${cnt > 0 ? cnt+'本' : ''}</div>`;
    c.addEventListener('click', () => selectDay(d));
    grid.appendChild(c);
  }
}

function selectDay(d) {
  selectedDay = d;
  buildCalendar();
  renderTimeList();
  const w = new Date(calYear, calMonth-1, d).getDay();
  document.getElementById('dayPanelDate').textContent = `${calYear}年${calMonth}月${d}日（${DW[w]}）`;
}

// ==================== TIME LIST ====================
let swipedRow = null;

function renderTimeList() {
  const key = `${calYear}-${calMonth}-${selectedDay}`;
  const times = smokeData[key] || [];
  const list = document.getElementById('timeList');
  list.innerHTML = '';
  swipedRow = null;

  if (times.length === 0) {
    list.innerHTML = '<div class="empty-day">記録なし</div>';
    return;
  }

  times.forEach((t, i) => {
    let interval = '−−:−−';
    if (i > 0) {
      const [ph,pm] = times[i-1].split(':').map(Number);
      const [ch,cm] = t.split(':').map(Number);
      const diff = (ch*60+cm) - (ph*60+pm);
      if (diff > 0) {
        interval = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
      }
    }

    const wrap = document.createElement('div');
    wrap.className = 'time-row-wrap';

    const row = document.createElement('div');
    row.className = 'time-row';
    row.innerHTML = `
      <div class="time-num">${i+1}</div>
      <div class="time-val">${t}</div>
      <div class="time-interval">${interval}</div>
    `;

    const acts = document.createElement('div');
    acts.className = 'swipe-actions';
    acts.innerHTML = `
      <button class="sw-edit"><span class="sw-icon">✏️</span>編集</button>
      <button class="sw-del"><span class="sw-icon">🗑</span>削除</button>
    `;

    // スワイプ処理
    let sx=0, sy=0, swiping=false, swiped=false;
    row.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      swiping = false; swiped = false;
    }, { passive: true });
    row.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - sx;
      const dy = e.touches[0].clientY - sy;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 6) swiping = true;
      if (!swiping) return;
      if (dx < -10) {
        row.style.transform = `translateX(${Math.max(dx, -140)}px)`;
        swiped = true;
      } else if (dx > 10) {
        row.style.transform = 'translateX(0)';
        swiped = false;
      }
    }, { passive: true });
    row.addEventListener('touchend', () => {
      if (swiped) {
        if (swipedRow && swipedRow !== row) swipedRow.style.transform = 'translateX(0)';
        row.style.transform = 'translateX(-140px)';
        swipedRow = row;
      } else {
        row.style.transform = 'translateX(0)';
        if (swipedRow === row) swipedRow = null;
      }
    });

    acts.querySelector('.sw-edit').addEventListener('click', () => {
      openTimeModal('edit', key, i, t);
      row.style.transform = 'translateX(0)';
    });
    acts.querySelector('.sw-del').addEventListener('click', () => {
      smokeData[key].splice(i, 1);
      if (smokeData[key].length === 0) delete smokeData[key];
      save(); renderTimeList(); buildCalendar(); refreshHome();
    });

    wrap.appendChild(acts);
    wrap.appendChild(row);
    list.appendChild(wrap);
  });
}

// ==================== TIME MODAL ====================
let modalMode = 'add', modalKey = '', modalIdx = -1;

function openTimeModal(mode, key, idx, val) {
  modalMode = mode; modalKey = key; modalIdx = idx;
  document.getElementById('modalTitle').textContent = mode === 'add' ? '喫煙時刻を追加' : '喫煙時刻を編集';
  document.getElementById('timeInput').value = val || '12:00';
  document.getElementById('modal').classList.add('open');
}
function closeTimeModal() { document.getElementById('modal').classList.remove('open'); }

document.getElementById('addBtn').addEventListener('click', () => {
  const key = `${calYear}-${calMonth}-${selectedDay}`;
  const now = new Date();
  const hh = now.getHours().toString().padStart(2,'0');
  const mm = now.getMinutes().toString().padStart(2,'0');
  openTimeModal('add', key, -1, `${hh}:${mm}`);
});
document.getElementById('modalCancel').addEventListener('click', closeTimeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeTimeModal();
});
document.getElementById('modalSave').addEventListener('click', () => {
  const val = document.getElementById('timeInput').value;
  if (!val) { closeTimeModal(); return; }
  if (!smokeData[modalKey]) smokeData[modalKey] = [];
  if (modalMode === 'add') {
    smokeData[modalKey].push(val);
  } else {
    smokeData[modalKey][modalIdx] = val;
  }
  smokeData[modalKey].sort();
  save(); closeTimeModal(); renderTimeList(); buildCalendar(); refreshHome();
});

// ==================== CALENDAR NAV ====================
document.getElementById('prevBtn').addEventListener('click', () => {
  calMonth--; if (calMonth < 1) { calMonth = 12; calYear--; }
  selectedDay = 1; buildCalendar(); selectDay(1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  calMonth++; if (calMonth > 12) { calMonth = 1; calYear++; }
  selectedDay = 1; buildCalendar(); selectDay(1);
});

// ==================== SETTINGS ====================
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('targetInput').value = settings.target;
  document.getElementById('priceInput').value = settings.price;
  document.getElementById('settingsModal').classList.add('open');
});
document.getElementById('settingsModal').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsModal'))
    document.getElementById('settingsModal').classList.remove('open');
});
document.getElementById('settingsSave').addEventListener('click', () => {
  settings.target = Math.max(1, parseInt(document.getElementById('targetInput').value) || 3);
  settings.price  = Math.max(1, parseInt(document.getElementById('priceInput').value) || 27);
  saveSettings();
  document.getElementById('settingsModal').classList.remove('open');
  refreshHome(); buildCalendar(); renderTimeList();
});

// ==================== INIT ====================
refreshHome();
buildCalendar();
selectDay(selectedDay);
</script>
</body>
</html>
